version: "3.8"

services:
  api:
    build: .
    container_name: prodaflt_api
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - API_HOST=0.0.0.0
      - API_PORT=8000
    command: uvicorn prodaflt.api.app.main:app --host 0.0.0.0 --port 8000
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3

  parser:
    build: .
    container_name: prodaflt_parser
    env_file:
      - .env
    environment:
      - PARSER_BOT_TOKEN=${PARSER_BOT_TOKEN}
      - GROUP_CHAT_ID=${GROUP_CHAT_ID}
      - DATABASE_URL=${DATABASE_URL}
    command: python -m prodaflt.bots.parser.bot
    restart: unless-stopped
    depends_on:
      - api

  alert-engine:
    build: .
    container_name: prodaflt_alerts
    env_file:
      - .env
    environment:
      - ADMIN_CHAT_ID=${ADMIN_CHAT_ID}
      - DATABASE_URL=${DATABASE_URL}
    command: python -m prodaflt.bots.alert_engine.main
    restart: unless-stopped
    depends_on:
      - api
